<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word AI Assistant</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="./taskpane.css">
</head>
<body>
  <main class="pane">
    <header class="header">
      <span id="healthStatus" class="status-dot" title="Backend status"></span>
    </header>

    <section class="selection-strip">
      <strong id="scopeLabel">Selection auto-detected</strong>
      <pre id="selectedPreview">(Select text in Word, then ask the agent.)</pre>
    </section>

    <details class="history-strip" open>
      <summary id="historyTitle">History</summary>
      <div class="history-body">
        <select id="sessionSelect"></select>
        <div class="history-actions">
          <button id="openSessionButton" type="button">Open</button>
          <button id="newSessionButton" type="button">New</button>
          <button id="refreshSessionsButton" type="button">Refresh</button>
        </div>
      </div>
    </details>

    <section class="chat-section">
      <div id="loading" class="loading" hidden>Processing...</div>
      <div id="errorBox" class="error-box" hidden></div>
      <div id="chatLog" class="chat-log" aria-live="polite"></div>
    </section>

    <section class="composer">
      <textarea id="agentInput" rows="3" placeholder="Ask about the selected text or document."></textarea>
      <div class="composer-actions composer-actions-wide">
        <div class="composer-meta">
          <button id="agentButton" class="primary-button" type="button">Send</button>
        </div>
      </div>
    </section>
  </main>

  <dialog id="reviewDialog" class="review-dialog">
    <div class="review-dialog-header">
      <span data-i18n="reviewTitle">变更审查</span>
      <button id="reviewCloseBtn" class="review-close" type="button">&times;</button>
    </div>
    <div class="review-diff">
      <div class="review-col">
        <div class="review-col-label">替换前</div>
        <pre id="reviewBefore" class="review-text"></pre>
      </div>
      <div class="review-col">
        <div class="review-col-label">替换后</div>
        <pre id="reviewAfter" class="review-text"></pre>
      </div>
    </div>
    <div class="review-dialog-footer">
      <button id="reviewUndoFromDialog" type="button">撤销</button>
      <button id="reviewCloseFooter" type="button">关闭</button>
    </div>
  </dialog>

  <script src="./shared.js"></script>
  <script src="./taskpane.js"></script>
</body>
</html>
