<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word AI Assistant</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="./taskpane.css">
</head>
<body>
  <main class="pane">
    <header class="header">
      <div>
        <h1>Agent</h1>
        <p id="hostStatus">Connecting to Word...</p>
      </div>
      <span id="healthStatus" class="status-dot" title="Backend status"></span>
    </header>

    <section class="selection-strip">
      <strong id="scopeLabel">Selection auto-detected</strong>
      <pre id="selectedPreview">(Select text in Word, then ask the agent.)</pre>
    </section>

    <section class="chat-section">
      <div id="loading" class="loading" hidden>Processing...</div>
      <div id="errorBox" class="error-box" hidden></div>
      <div id="chatLog" class="chat-log" aria-live="polite"></div>
    </section>

    <section class="composer">
      <textarea id="agentInput" rows="3" placeholder="Ask about the selected text or document."></textarea>
      <div class="composer-actions">
        <button id="resetAgentButton" type="button">Reset</button>
        <button id="agentButton" class="primary-button" type="button">Send</button>
      </div>
    </section>
  </main>

  <script src="./taskpane.js"></script>
</body>
</html>
