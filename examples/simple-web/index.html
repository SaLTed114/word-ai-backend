<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word AI Agent Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>Word AI Agent</h1>
        <span id="sessionBadge" class="session-badge">No session</span>
      </div>
      <div class="connection">
        <label for="apiBase">API</label>
        <input id="apiBase" type="url" value="http://127.0.0.1:8000" spellcheck="false">
        <button id="healthButton" type="button">Check</button>
        <span id="healthStatus" class="status-dot" title="API status"></span>
      </div>
    </header>

    <main class="workspace">
      <section class="editor-pane" aria-label="Document editor">
        <div class="editor-toolbar">
          <input id="fileInput" type="file" accept=".txt,text/plain" hidden>
          <button id="openButton" type="button">Open</button>
          <button id="saveButton" type="button">Save</button>
          <button id="clearButton" type="button">Clear</button>
          <span id="selectionStatus" class="selection-status">Full document</span>
          <span id="editorStats" class="editor-stats">0 chars</span>
        </div>

        <div class="document-meta">
          <label for="documentTitle">Title</label>
          <input id="documentTitle" type="text" value="Draft Methods Section" spellcheck="true">
          <label for="activeScope">Scope</label>
          <select id="activeScope">
            <option value="selection">Selection</option>
            <option value="paragraph">Paragraph</option>
            <option value="document">Document</option>
          </select>
        </div>

        <textarea id="editor" spellcheck="true"></textarea>
      </section>

      <aside class="agent-pane" aria-label="Agent chat">
        <section class="memory-panel">
          <details>
            <summary>Memory</summary>
            <label for="documentSummary">Document summary</label>
            <textarea id="documentSummary" class="memory-input"></textarea>

            <label for="writingGoals">Writing goals</label>
            <textarea id="writingGoals" class="memory-input"></textarea>

            <label for="keyTerms">Key terms</label>
            <textarea id="keyTerms" class="memory-input"></textarea>

            <label for="userPreferences">User preferences</label>
            <textarea id="userPreferences" class="memory-input"></textarea>

            <div class="memory-actions">
              <button id="saveMemoryButton" type="button">Save Memory</button>
              <button id="loadMemoryButton" type="button">Reload</button>
            </div>
          </details>
        </section>

        <section class="chat-panel">
          <div id="chatLog" class="chat-log" aria-live="polite"></div>
          <div id="errorBox" class="error-box" hidden></div>
          <div id="loading" class="loading" hidden>Thinking...</div>
          <div class="composer">
            <textarea id="agentInput" placeholder="Ask the agent..." rows="3"></textarea>
          <div class="composer-actions">
            <button id="newSessionButton" type="button">New</button>
            <button id="undoApplyButton" type="button" disabled>Undo</button>
            <button id="sendButton" type="button">Send</button>
          </div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
